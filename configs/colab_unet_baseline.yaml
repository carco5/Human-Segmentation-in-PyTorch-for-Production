project:
  name: "Human Segmentation in PyTorch for Production"
  task: "binary_semantic_segmentation"
  seed: 42

data:
  image_size: 256
  num_classes: 1
  input_channels: 3
  train_split: 0.8
  val_split: 0.2

dataset:
  name: "CIHP"
  raw_root_dir: "data/raw/CIHP"
  processed_root_dir: "data/processed/cihp_binary"
  image_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
  mask_extension: ".png"
  background_value: 0
  person_value: 1

  raw_splits:
    train:
      images_dir: "data/raw/CIHP/Training/Images"
      category_masks_dir: "data/raw/CIHP/Training/Category_ids"
      id_file: "data/raw/CIHP/Training/train_id.txt"
    val:
      images_dir: "data/raw/CIHP/Validation/Images"
      category_masks_dir: "data/raw/CIHP/Validation/Category_ids"
      id_file: "data/raw/CIHP/Validation/val_id.txt"

  splits:
    train:
      images_dir: "data/processed/cihp_binary/train/images"
      masks_dir: "data/processed/cihp_binary/train/masks"
    val:
      images_dir: "data/processed/cihp_binary/val/images"
      masks_dir: "data/processed/cihp_binary/val/masks"

model:
  name: "unet"
  in_channels: 3
  out_channels: 1
  base_channels: 32

loss:
  name: "bce_plus_dice"
  bce_weight: 0.5
  dice_weight: 0.5

evaluation:
  threshold: 0.5
  epsilon: 0.000001

debug:
  tiny_overfit:
    num_samples: 8
    batch_size: 2
    num_epochs: 12

training:
  batch_size: 8
  learning_rate: 0.001
  num_epochs: 6
  device: "cuda"
  max_train_batches: null
  max_val_batches: null
  num_workers: 2
  pin_memory: true

experiment:
  name: "unet_bce_dice_colab_baseline"
  checkpoint_metric: "dice"

paths:
  raw_data_dir: "data/raw"
  interim_data_dir: "data/interim"
  processed_data_dir: "data/processed"
  figures_dir: "/content/drive/MyDrive/ML Projects/Human-Segmentation-in-PyTorch-for-Production/outputs/figures"
  metrics_dir: "/content/drive/MyDrive/ML Projects/Human-Segmentation-in-PyTorch-for-Production/outputs/metrics"
  predictions_dir: "/content/drive/MyDrive/ML Projects/Human-Segmentation-in-PyTorch-for-Production/outputs/predictions"
  checkpoints_dir: "/content/drive/MyDrive/ML Projects/Human-Segmentation-in-PyTorch-for-Production/outputs/checkpoints"